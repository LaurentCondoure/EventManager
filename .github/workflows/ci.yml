name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ── Frontend ──────────────────────────────────────────────────────────────
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/EventManagement.UI/package-lock.json

      - name: Install
        run: npm ci
        working-directory: frontend/EventManagement.UI

      - name: Lint
        run: npm run lint
        working-directory: frontend/EventManagement.UI

      - name: Test
        run: npm run test:unit -- --run --reporter=verbose --coverage
        working-directory: frontend/EventManagement.UI

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          directory: frontend/EventManagement.UI/coverage
          flags: frontend
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  # ── Unit tests (Moq, no Docker) ───────────────────────────────────────────
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install dotnet-coverage
        run: dotnet tool install --global dotnet-coverage

      - name: Restore
        run: dotnet restore backend/tests/EventManager.Tests/EventManager.Tests.csproj

      - name: Build
        run: dotnet build backend/tests/EventManager.Tests/EventManager.Tests.csproj --no-restore --configuration Release

      - name: Test
        run: |
          dotnet-coverage collect \
            "dotnet test backend/tests/EventManager.Tests/EventManager.Tests.csproj --no-build --configuration Release" \
            -f cobertura -o ./coverage/unit/coverage.cobertura.xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: ./coverage/unit

  # ── Integration tests (WebApplicationFactory + fakes, no Docker) ──────────
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install dotnet-coverage
        run: dotnet tool install --global dotnet-coverage

      - name: Restore
        run: dotnet restore backend/tests/EventManager.IntegrationTests/EventManager.IntegrationTests.csproj

      - name: Build
        run: dotnet build backend/tests/EventManager.IntegrationTests/EventManager.IntegrationTests.csproj --no-restore --configuration Release

      - name: Test
        run: |
          dotnet-coverage collect \
            "dotnet test backend/tests/EventManager.IntegrationTests/EventManager.IntegrationTests.csproj --no-build --configuration Release" \
            -f cobertura -o ./coverage/integration/coverage.cobertura.xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-integration
          path: ./coverage/integration

  # ── Infrastructure tests (Testcontainers — Docker required) ───────────────
  test-infrastructure:
    name: Infrastructure Tests (Testcontainers)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install dotnet-coverage
        run: dotnet tool install --global dotnet-coverage

      - name: Restore
        run: dotnet restore backend/tests/EventManager.InfrastructureTests/EventManager.InfrastructureTests.csproj

      - name: Build
        run: dotnet build backend/tests/EventManager.InfrastructureTests/EventManager.InfrastructureTests.csproj --no-restore --configuration Release

      - name: Test
        run: |
          dotnet-coverage collect \
            "dotnet test backend/tests/EventManager.InfrastructureTests/EventManager.InfrastructureTests.csproj --no-build --configuration Release" \
            -f cobertura -o ./coverage/infrastructure/coverage.cobertura.xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-infrastructure
          path: ./coverage/infrastructure

  # ── Coverage report (merges all three layers) ─────────────────────────────
  coverage-report:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [ test-unit, test-integration, test-infrastructure ]

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Download unit coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-unit
          path: ./coverage/unit

      - name: Download integration coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-integration
          path: ./coverage/integration

      - name: Download infrastructure coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-infrastructure
          path: ./coverage/infrastructure

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          directory: ./coverage
          flags: backend
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Generate coverage report
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool
          reportgenerator \
            -reports:"./coverage/**/coverage.cobertura.xml" \
            -targetdir:coveragereport \
            -reporttypes:"MarkdownSummaryGithub;Html" \
            -title:"EventManager — Coverage Report"
          cat coveragereport/SummaryGithub.md >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage report artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coveragereport/
          retention-days: 30
